name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: dotnet build --configuration Release
      - run: dotnet run --project tests/ProfessionalizationChecks/ProfessionalizationChecks.csproj --configuration Release
